# ============================================================
# BOERDI – Flow-Registry
# ============================================================
# Diese Datei ist die zentrale Einstiegsdatei für Boerdi.
# Sie enthält NUR die Liste der verfügbaren Flows.
# Jeder Flow liegt als eigenständige config.yml in seinem Unterordner:
#   assets/flows/{flow-id}/config.yml
#   assets/flows/{flow-id}/personas/*.md
#
# Optionen:
#   configFile:  Pfad zur YAML-Konfiguration des Flows
#   default:     true → Flow wird direkt gestartet (kein Auswahlscreen)
#                false/leer → Flow erscheint im Auswahlscreen
#
# BoerdiFlowStudio-Export:
#   ZIP entpacken nach assets/flows/{slug}/
#   Dann hier einen neuen Eintrag hinzufügen.
# ============================================================

flows:
  - id: boerdi-wlo
    name: "🦉 Boerdi – WLO Klassisch"
    description: "Geführter Flow · 7 Rollen · 12 Bildungsstufen · MCP-Suche · Loop-Navigation"
    configFile: "assets/flows/boerdi-wlo/config.yml"

  - id: wlo-website-bot
    name: "🌐 WLO Website Bot (W-00)"
    description: "KI-Intent-Weiche · 5 Zielgruppen · Soft-Probing · Handoff"
    configFile: "assets/flows/wlo-website-bot/config.yml"

  - id: wlo-agent
    name: "🤖 WLO Agent (1-Knoten)"
    description: "1-Knoten Agent · Alle MCP-Tools · Gesprächsführung per System-Prompt · 5 Zielgruppen"
    configFile: "assets/flows/wlo-agent/config.yml"
