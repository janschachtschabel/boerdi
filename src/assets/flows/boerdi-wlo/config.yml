# ============================================================
# BOERDI – WLO Klassisch (geführter Flow)
# ============================================================
# Eigenständige Flow-Konfiguration – wird über assets/boerdi-config.yml
# (Registry) referenziert. Alle Persona-Dateien liegen relativ zu
# dieser Datei im Ordner personas/ (falls vorhanden).
# ============================================================

bot:
  name: Boerdi
  avatar: "🦉"
  tagline: "Dein persönlicher Guide für WirLernenOnline.de"

api:
  baseUrl: "/bapi-proxy"
  model: "gpt-4.1-mini"
  apiKeyHeader: "X-API-KEY"

mcp:
  serverUrl: "https://wlo-mcp-server.vercel.app/mcp"
  searchTool: "search_wlo_collections"
  fetchTool: "fetch_web_content"

# ── Personas ─────────────────────────────────────────────────
# personaFile-Pfade sind RELATIV zu dieser Datei.
# Falls eine Datei nicht existiert: Boerdi fällt auf Default-Prompt zurück.
# Zur Anpassung des Gesprächs-Tons: Dateien in personas/ anlegen/bearbeiten.
personas:
  learner:
    label: "Lerner/in"
    uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/learner"
    personaFile: "personas/learner.md"

  teacher:
    label: "Lehrer/in"
    uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/teacher"
    personaFile: "personas/teacher.md"

  counsellor:
    label: "Berater/in"
    uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/counsellor"
    personaFile: "personas/counsellor.md"

  parent:
    label: "Eltern"
    uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/parent"
    personaFile: "personas/parent.md"

  author:
    label: "Autor/in"
    uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/author"
    personaFile: "personas/author.md"

  manager:
    label: "Verwaltung"
    uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/manager"
    personaFile: "personas/manager.md"

  other:
    label: "Andere"
    uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/other"
    personaFile: "personas/other.md"

# ── Gesprächs-Flow ───────────────────────────────────────────
# Schritttypen: message, choice, freetext, mcp_search, chat, gateway, handoff, input
# Optionen: label, value, uri, persona, primary, next (__restart|__back|stepId)

flow:
  - id: welcome
    type: message
    message: |
      Hi, ich bin **Boerdi** 🦉 und möchte dich bei der Suche nach Bildungsressourcen unterstützen!

      Auf **WirLernenOnline.de** findest du tausende freie Bildungsmaterialien (OER) –
      und ich helfe dir, genau das Richtige für dich zu entdecken. 👇
    next: role

  - id: role
    type: choice
    field: role
    message: "Für wen suchst du Materialien? Das hilft mir, besser auf dich einzugehen."
    options:
      - label: "🎒 Ich lerne (Schüler/in, Student/in)"
        value: learner
        uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/learner"
        persona: learner
        primary: true
      - label: "📚 Ich unterrichte (Lehrer/in)"
        value: teacher
        uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/teacher"
        persona: teacher
      - label: "👪 Als Elternteil / Erziehungsberechtigte*r"
        value: parent
        uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/parent"
        persona: parent
      - label: "🤝 Als Berater/in"
        value: counsellor
        uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/counsellor"
        persona: counsellor
      - label: "✏️ Als Autor/in (Materialerstellung)"
        value: author
        uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/author"
        persona: author
      - label: "🏛️ Verwaltung / Schulleitung"
        value: manager
        uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/manager"
        persona: manager
      - label: "🔍 Anderes / Nur erkunden"
        value: other
        uri: "http://w3id.org/openeduhub/vocabs/intendedEndUserRole/other"
        persona: other
    next: educationLevel

  - id: educationLevel
    type: choice
    field: educationLevels
    personaMessages:
      learner: "In welcher Schulstufe oder welchem Bildungsbereich lernst du gerade?"
      teacher: "Für welche Bildungsstufen unterrichten Sie?"
      counsellor: "Auf welche Bildungsstufen bezieht sich Ihre Beratungstätigkeit?"
      parent: "Welche Schulstufe besucht Ihr Kind?"
      author: "Für welche Bildungsstufen erstellen Sie Materialien?"
      manager: "Welche Bildungsstufen umfasst Ihre Einrichtung?"
      other: "Welche Bildungsbereiche interessieren dich?"
    options:
      - label: "🧒 Elementarbereich"
        value: elementarbereich
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/elementarbereich"
      - label: "🏫 Schule (allgemein)"
        value: schule
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/schule"
      - label: "📗 Primarstufe (Grundschule)"
        value: grundschule
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/grundschule"
      - label: "📘 Sekundarstufe I (Kl. 5–10)"
        value: sekundarstufe_1
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/sekundarstufe_1"
      - label: "📙 Sekundarstufe II (Kl. 11–13)"
        value: sekundarstufe_2
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/sekundarstufe_2"
      - label: "🎓 Hochschule"
        value: hochschule
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/hochschule"
      - label: "🔧 Berufliche Bildung"
        value: berufliche_bildung
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/berufliche_bildung"
      - label: "📈 Fortbildung"
        value: fortbildung
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/fortbildung"
      - label: "🌱 Erwachsenenbildung"
        value: erwachsenenbildung
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/erwachsenenbildung"
      - label: "🌟 Förderschule"
        value: foerderschule
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/foerderschule"
      - label: "💻 Fernunterricht"
        value: fernunterricht
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/fernunterricht"
      - label: "🔓 Informelles Lernen"
        value: informelles_lernen
        uri: "http://w3id.org/openeduhub/vocabs/educationalContext/informelles_lernen"
    next: interest

  - id: interest
    type: freetext
    field: interest
    personaMessages:
      learner: "Super! 🎉 Für welches **Thema** suchst du gerade Lernmaterialien?"
      teacher: "Gut! Für welches **Thema** suchen Sie Unterrichtsmaterialien?"
      counsellor: "Zu welchem **Thema** suchen Sie Beratungs- oder Fördermaterial?"
      parent: "Wobei möchtest du dein Kind unterstützen? Welches **Thema**?"
      author: "Zu welchem **Thema** suchen Sie Quellen oder Inspiration?"
      manager: "Zu welchem **Thema** suchen Sie Ressourcen für Ihre Einrichtung?"
      other: "Für welches **Thema** soll ich suchen?"
    suggestions:
      - "Addition und Subtraktion"
      - "Klimawandel und Nachhaltigkeit"
      - "Demokratie und Gesellschaft"
      - "Bruchrechnung"
      - "Deutsch Grammatik"
      - "Programmieren lernen"
      - "Englisch Grundschule"
      - "Biologie Zelle"
      - "Geschichte Zweiter Weltkrieg"
      - "Physik Mechanik"
    placeholder: "z.B. Mathematik Bruchrechnung, Klimawandel, Fotosynthese …"
    next: search

  - id: search
    type: mcp_search
    message: "Ich suche gerade passende Inhalte für dich …"
    next: after_search

  - id: after_search
    type: choice
    message: "Was möchtest du als nächstes tun?"
    options:
      - label: "💬 Ergebnisse erkunden (Chat)"
        value: chat
        next: chat
        primary: true
      - label: "🔄 Anderes Thema suchen"
        value: new_search
        next: interest
      - label: "👤 Andere Rolle / Bildungsstufe wählen"
        value: new_role
        next: role
      - label: "🔁 Von vorne starten"
        value: restart
        next: __restart

  - id: chat
    type: chat
    suggestions:
      - "Zeig mir die Inhalte dieser Sammlung"
      - "Gibt es Untersammlungen dazu?"
      - "Suche nach einem anderen Thema"
      - "Was ist WirLernenOnline?"
      - "Welche Materialien gibt es für Anfänger?"
      - "Gibt es Videos dazu?"
    personaMessages:
      learner: "Ich habe passende Themenseiten für dich gefunden! 😊 Klicke auf eine Kachel oder stelle mir weitere Fragen – z.B. zu den Inhalten einer Sammlung."
      teacher: "Hier sind passende Sammlungen (Themenseiten). Möchten Sie die Inhalte einer Sammlung sehen, oder haben Sie weitere Fragen?"
      counsellor: "Hier sind passende Sammlungen zum Thema. Wie kann ich weiter helfen?"
      parent: "Ich habe passende Themenseiten gefunden. Soll ich die Inhalte anzeigen oder ein anderes Thema erkunden?"
      author: "Hier sind thematisch passende Sammlungen. Möchten Sie mehr dazu?"
      manager: "Hier sind relevante Sammlungen für Ihre Einrichtung. Wie kann ich weiter helfen?"
      other: "Hier sind die gefundenen Themenseiten. Wie kann ich weiter helfen?"
